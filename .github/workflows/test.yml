name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Enforces React Hooks / React Compiler (Rules-of-React) compliance for the
    # React-shipping packages via eslint-plugin-react-hooks. The backlog has been
    # cleared, so this is a required gate: any new finding fails the check.
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: '24.14.1'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint React packages (react-hooks / react-compiler rules)
        run: pnpm lint:react

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: '24.14.1'
          cache: 'pnpm'

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vendor OpenJPH for spatialdata-codec-writer
        run: node scripts/vendor-openjph-for-python.mjs

      - name: Build packages
        run: pnpm build

      # Fixtures rarely change, so cache the generated output and only regenerate
      # when the generation code or its pinned deps change. The key hashes the
      # orchestrator plus each version's script + pyproject.toml + uv.lock; an
      # exact-match key (no restore-keys) means any of those changes forces a
      # full regeneration rather than restoring stale fixtures. (uv's own cache is
      # handled by astral-sh/setup-uv, not here.)
      - name: Cache generated test fixtures
        id: cache-fixtures
        uses: actions/cache@v5
        with:
          path: test-fixtures
          key: ${{ runner.os }}-test-fixtures-${{ hashFiles('python/scripts/generate_fixtures.py', 'python/v0.5.0/**', 'python/v0.6.1/**', 'python/v0.7.2/**') }}

      - name: Generate test fixtures (Python spatialdata 0.5.0, 0.6.1, and 0.7.2)
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: pnpm test:fixtures:generate

      - name: Run spatialdata-codec-writer tests
        run: uv run --directory python/spatialdata-codec-writer pytest

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests with local server
        shell: bash
        run: |
          # Verify fixtures exist before starting server
          if [ ! -d "test-fixtures/v0.5.0/blobs.zarr" ]; then
            echo "Error: Fixtures not found at test-fixtures/v0.5.0/blobs.zarr"
            echo "Listing test-fixtures directory:"
            ls -la test-fixtures/ || echo "test-fixtures directory does not exist"
            exit 1
          fi
          
          # Start test server in background
          pnpm test:server &
          SERVER_PID=$!

          # Wait for server to be ready (up to ~30s)
          # Check both root and a fixture path to ensure server is fully ready
          for i in {1..30}; do
            if curl -sSf http://localhost:38473/ >/dev/null && \
               curl -sSf http://localhost:38473/v0.5.0/blobs.zarr/zmetadata >/dev/null; then
              echo "Test server is up and serving fixtures"
              break
            fi
            echo "Waiting for test server on http://localhost:38473/ ..."
            sleep 1
          done

          # Small additional delay to ensure server is fully ready
          sleep 2

          # Run integration tests (will hit http://localhost:38473/…)
          pnpm test:integration

          # Clean up server
          kill "$SERVER_PID" || true
