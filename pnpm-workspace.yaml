packages:
  - packages/*
  - docs

allowBuilds:
  '@biomejs/biome': false
  '@vaadin/vaadin-usage-statistics': false
  core-js: false
  core-js-pure: false

# Force patched versions of vulnerable transitive deps that are pinned deep in the
# Docusaurus docs-site build stack (dev-only, not shipped). Ranges target only the
# vulnerable versions so intentional other-major installs are left untouched.
# caniuse-lite is bumped to silence the stale browserslist data warning.
overrides:
  caniuse-lite: ^1.0.30001805
  'shell-quote@>=1.0.0 <1.8.4': ^1.8.4
  'ws@>=7.0.0 <7.5.11': ^7.5.11
  'fast-uri@>=3.0.0 <3.1.2': ^3.1.2
  '@babel/plugin-transform-modules-systemjs@>=7.0.0 <7.29.4': ^7.29.4
  'lodash@>=4.0.0 <4.18.0': ^4.18.0
  'minimatch@>=3.0.0 <3.1.3': ^3.1.3
  'node-forge@>=1.0.0 <1.4.0': ^1.4.0
  'path-to-regexp@<0.1.13': 0.1.13
  'preact@>=10.27.0 <10.27.3': ^10.27.3
  'rollup@>=4.0.0 <4.59.0': ^4.59.0
  'svgo@>=3.0.0 <3.3.3': ^3.3.3

catalog:
  '@zarrita/storage': ^0.2.0
  '@rolldown/plugin-babel': ^0.2.3
  babel-plugin-react-compiler: ^1.0.0
  '@deck.gl/aggregation-layers': ~9.3.5
  '@deck.gl/arcgis': ~9.3.5
  '@deck.gl/core': ~9.3.5
  '@deck.gl/extensions': ~9.3.5
  '@deck.gl/geo-layers': ~9.3.5
  '@deck.gl/google-maps': ~9.3.5
  '@deck.gl/layers': ~9.3.5
  '@deck.gl/mapbox': ~9.3.5
  '@deck.gl/mesh-layers': ~9.3.5
  '@deck.gl/react': ~9.3.5
  '@deck.gl/widgets': ~9.3.5
  '@loaders.gl/core': ~4.4.3
  '@luma.gl/constants': ~9.3.5
  '@luma.gl/core': ~9.3.5
  '@luma.gl/engine': ~9.3.5
  '@luma.gl/gltf': ~9.3.5
  '@luma.gl/shadertools': ~9.3.5
  '@luma.gl/webgl': ~9.3.5
  '@math.gl/core': ^4.1.0
  '@types/node': ^22.10.5
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^6.0.1
  '@hms-dbmi/viv': ^0.22.0
  '@vivjs/constants': 0.22.0
  '@vivjs/views': 0.22.0
  anndata.js: ^0.0.2
  apache-arrow: ^17.0.0
  deck.gl: ~9.3.5
  react: ^19.2.1
  react-dom: ^19.2.1
  # TypeScript 7.0 (the native port) ships no JS API, so tools that use the compiler
  # API (typescript-eslint) resolve the literal `typescript` to the TS 6 compat package,
  # while `@typescript/native` provides the TS 7 `tsc` used by the build scripts.
  typescript: 'npm:@typescript/typescript6@^6.0.2'
  '@typescript/native': 'npm:typescript@^7.0.2'
  vite: ^8.0.16
  vitest: ^4.1.4
  zarrita: ^0.7.1
  zod: ^4.1.13
  jsdom: ^27.4.0
